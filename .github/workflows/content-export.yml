name: Nightly content export

# Snapshots Firestore into content-export/ and opens (or updates) a PR if
# anything changed. Purely additive: the admin panel is still the source
# of truth — this just keeps a versioned mirror in git for diff review
# and offline backup.

on:
  schedule:
    # 02:00 UTC daily — well after any reasonable editor activity window.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: content-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # firebase-admin only — no workspace install, no pnpm. Pin to match
      # the version used in the repo's root devDependencies so serialised
      # Timestamps behave identically.
      - name: Install firebase-admin
        run: npm install --no-save --no-audit --no-fund firebase-admin@^12.7.0

      - name: Write service account key
        id: key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "path=$RUNNER_TEMP/sa.json" >> "$GITHUB_OUTPUT"

      - name: Export Firestore → content-export/
        run: node scripts/export-firestore-to-repo.mjs "${{ steps.key.outputs.path }}"

      - name: Remove service account key
        if: always()
        run: rm -f "${{ steps.key.outputs.path }}"

      - name: Create pull request if content changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/content-export
          base: main
          commit-message: 'chore: nightly content export'
          title: 'chore: nightly content export'
          body: |
            Automated snapshot of Firestore content into `content-export/`.

            Generated by `.github/workflows/content-export.yml` running
            `scripts/export-firestore-to-repo.mjs`.

            This PR is the canonical versioned mirror — it is **not** the
            source of truth. Review the diff to see what editors changed
            in the admin panel over the last 24 hours, then merge.
          labels: |
            content-export
            automated
          delete-branch: true
          add-paths: |
            content-export/**
