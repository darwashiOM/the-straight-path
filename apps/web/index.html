<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F5F5C" />
    <meta name="color-scheme" content="light dark" />

    <!-- Mobile / PWA capability -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Straight Path" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>The Straight Path — A Clear Path to God</title>
    <meta
      name="description"
      content="A pastoral, accessible introduction to Islam. Learn the essentials, read the Qur'an, and explore a clear path to God."
    />

    <!-- Favicon placeholders; replaced in SP-15 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Canonical & alternates -->
    <link rel="canonical" href="https://thestraightpath.app/" />
    <link rel="alternate" hreflang="en" href="https://thestraightpath.app/" />
    <link rel="alternate" hreflang="ar" href="https://thestraightpath.app/ar/" />
    <link rel="alternate" hreflang="x-default" href="https://thestraightpath.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Straight Path" />
    <meta property="og:title" content="The Straight Path — A Clear Path to God" />
    <meta
      property="og:description"
      content="A pastoral, accessible introduction to Islam."
    />
    <meta property="og:url" content="https://thestraightpath.app/" />
    <meta property="og:image" content="https://thestraightpath.app/og-default.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Straight Path" />
    <meta
      name="twitter:description"
      content="A pastoral, accessible introduction to Islam."
    />
    <meta name="twitter:image" content="https://thestraightpath.app/og-default.png" />

    <!-- Performance: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Organization JSON-LD; enhanced per-page in SP-13 -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "The Straight Path",
        "url": "https://thestraightpath.app",
        "logo": "https://thestraightpath.app/logo.png",
        "description": "A pastoral, accessible introduction to Islam."
      }
    </script>
  </head>
  <body class="bg-paper text-ink antialiased">
    <a href="#main" class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-primary-700 focus:px-4 focus:py-2 focus:text-white">Skip to content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
