<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F5F5C" />
    <title>Offline — The Straight Path</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #faf7f1;
        color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #0f2a29;
          color: #faf7f1;
        }
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        padding-top: calc(2rem + env(safe-area-inset-top));
        padding-bottom: calc(2rem + env(safe-area-inset-bottom));
      }
      .card {
        max-width: 32rem;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.5rem;
        display: block;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0 0 0.75rem;
        color: #0f5f5c;
      }
      @media (prefers-color-scheme: dark) {
        h1 {
          color: #c9a227;
        }
      }
      p {
        font-size: 1rem;
        line-height: 1.6;
        opacity: 0.85;
        margin: 0 0 1.5rem;
      }
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        border-radius: 0.75rem;
        background: #0f5f5c;
        color: #fff;
        border: 0;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover {
        background: #0c4e4b;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
          <rect width="64" height="64" rx="12" fill="#0F5F5C" />
          <path
            d="M16 44 L32 20 L48 44"
            stroke="#C9A227"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="32" cy="16" r="3" fill="#C9A227" />
        </svg>
        <h1>You're offline</h1>
        <p>
          It looks like you've lost your connection. Some content may still be available from your
          cache. Reconnect and try again.
        </p>
        <button type="button" onclick="location.reload()">Try again</button>
      </div>
    </div>
  </body>
</html>
